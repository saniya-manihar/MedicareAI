<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Medicare AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-cyan-500 flex items-center justify-center">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-6">

            <h1 class="text-4xl font-bold text-white">
                🩺 Medicare AI
            </h1>

            <p class="text-blue-100 mt-2">
                AI Powered Medical Assistant
            </p>

        </div>

        <!-- Card -->
        <div class="bg-white/20 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white/30">

            <h2 class="text-3xl font-bold text-center text-white mb-8">
                Welcome Back
            </h2>
{% if error %}
<div class="bg-red-500 text-white p-3 rounded-lg mb-4">
    {{ error }}
</div>
{% endif %}
            <form action="/login" method="POST">

                <div class="mb-5">

                    <label class="text-white font-semibold">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        class="w-full mt-2 p-3 rounded-lg outline-none">

                </div>

                <div class="mb-6">

                    <label class="text-white font-semibold">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        class="w-full mt-2 p-3 rounded-lg outline-none">

                </div>

                <button
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white py-3 rounded-lg font-bold transition">

                    Login

                </button>

            </form>

            <p class="text-center text-white mt-6">

                Don't have an account?

                <a href="/register"
                   class="font-bold underline">

                    Register

                </a>

            </p>

        </div>

    </div>

</body>
</html>
