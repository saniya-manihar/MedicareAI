<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Medicare AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-cyan-500 flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">

            <h1 class="text-3xl sm:text-4xl font-bold text-white whitespace-nowrap">
                🩺 Medicare AI
            </h1>

            <p class="text-sm sm:text-base text-blue-100 mt-2">
                AI Powered Medical Assistant
            </p>

        </div>

        <!-- Login Card -->
        <div class="bg-white/20 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/30 p-6 sm:p-8">

            <h2 class="text-3xl sm:text-4xl font-bold text-center text-white mb-8">
                Welcome Back
            </h2>

            {% if error %}
            <div class="bg-red-500 text-white text-center rounded-xl p-3 mb-6">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-6">

                <!-- Email -->
                <div>

                    <label class="block text-white font-semibold mb-2">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                        class="w-full rounded-xl px-4 py-3 text-gray-800
                               focus:outline-none focus:ring-4
                               focus:ring-blue-300">

                </div>

                <!-- Password -->
                <div>

                    <label class="block text-white font-semibold mb-2">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        class="w-full rounded-xl px-4 py-3 text-gray-800
                               focus:outline-none focus:ring-4
                               focus:ring-blue-300">

                </div>

                <!-- Login Button -->
                <button
                    type="submit"
                    class="w-full bg-blue-700 hover:bg-blue-800
                           rounded-xl py-3 text-white font-semibold
                           transition duration-300">

                    Login

                </button>

            </form>

            <!-- Register Link -->
            <p class="text-center text-white text-sm sm:text-base mt-6">

                Don't have an account?

                <a href="/register"
                   class="font-semibold underline hover:text-blue-200 transition">

                    Register

                </a>

            </p>

        </div>

    </div>

</body>
</html>
