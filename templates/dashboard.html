<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Medical AI Dashboard</title>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-blue-700 text-white shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center p-4">

            <h1 class="text-2xl font-bold">
                🩺 Medicare AI
            </h1>

            <a href="/logout" class="bg-white text-blue-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200">
                Logout
            </a>

        </div>
    </nav>

    <!-- Main Container -->
    <div class="max-w-4xl mx-auto mt-10">

        <div class="bg-white rounded-xl shadow-lg p-8">

            <h2 class="text-3xl font-bold text-center text-blue-700 mb-6">
                Hello 👋

                How can I help you today?
            </h2>

            <form action="/ask" method="POST">

                <div class="flex gap-3">

                    <input value="{{ question if question else '' }}" type="text" name="question"
                        placeholder="Ask your medical question..."
                        class="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required>

                    <button class="bg-blue-700 text-white px-6 rounded-lg hover:bg-blue-800">

                        Ask

                    </button>

                </div>

            </form>

        </div>
        {% if question %}

        <div class="bg-blue-100 rounded-xl p-5 mt-2 mb-4 shadow">

            <h3 class="font-bold text-blue-700">
                👤 You
            </h3>

            <p class="mt-2">
                {{ question }}
            </p>

        </div>

        {% endif %}
        {% if answer %}

        <div class="bg-white shadow-lg rounded-xl mt-8 p-6">

            <h3 class="text-xl font-bold text-green-600 mb-3">
                🤖 AI Response
            </h3>

            <p class="text-gray-700 leading-8">
                {{ answer }}
            </p>

        </div>

        {% endif %}
        <div class="mt-5 text-sm text-gray-500">

            ⚠️ This AI assistant is for educational purposes only.
            Please consult a doctor for medical advice.

        </div>
    </div>


</body>

</html>
