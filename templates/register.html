<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Medicare AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-cyan-500 flex items-center justify-center px-4 py-10">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">

        <h1 class="text-3xl sm:text-4xl font-bold text-white whitespace-nowrap">
            🩺 Medicare AI
        </h1>

        <p class="text-sm sm:text-base text-blue-100 mt-2">
            Create your account
        </p>

    </div>

    <!-- Register Card -->
    <div class="bg-white/20 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/30 p-6 sm:p-8">

        <h2 class="text-3xl sm:text-4xl font-bold text-center text-white mb-8">
            Register
        </h2>

        <form action="/register" method="POST" class="space-y-5">

            <div>

                <label class="block text-white font-semibold mb-2">
                    Full Name
                </label>

                <input
                    type="text"
                    name="name"
                    placeholder="Enter your full name"
                    required
                    class="w-full rounded-xl px-4 py-3 text-gray-800
                    focus:outline-none focus:ring-4 focus:ring-green-300">

            </div>

            <div>

                <label class="block text-white font-semibold mb-2">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                    class="w-full rounded-xl px-4 py-3 text-gray-800
                    focus:outline-none focus:ring-4 focus:ring-green-300">

            </div>

            <div>

                <label class="block text-white font-semibold mb-2">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Create a password"
                    required
                    class="w-full rounded-xl px-4 py-3 text-gray-800
                    focus:outline-none focus:ring-4 focus:ring-green-300">

            </div>

            <button
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700
                rounded-xl py-3 text-white font-semibold transition">

                Create Account

            </button>

        </form>

        <p class="text-center text-white text-sm sm:text-base mt-6">

            Already have an account?

            <a href="/login"
               class="font-semibold underline hover:text-green-200">

                Login

            </a>

        </p>

    </div>

</div>

</body>
</html>
