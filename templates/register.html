<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Medicare AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-cyan-500 flex items-center justify-center">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-6">

            <h1 class="text-4xl font-bold text-white">
                🩺 Medicare AI
            </h1>

            <p class="text-blue-100 mt-2">
                Create your account
            </p>

        </div>

        <!-- Register Card -->
        <div class="bg-white/20 backdrop-blur-lg rounded-2xl shadow-2xl p-8 border border-white/30">

            <h2 class="text-3xl font-bold text-center text-white mb-8">
                Register
            </h2>

            <form action="/register" method="POST">

                <div class="mb-4">
                    <label class="text-white font-semibold">Full Name</label>
                    <input
                        type="text"
                        name="name"
                        placeholder="Enter your name"
                        class="w-full mt-2 p-3 rounded-lg outline-none"
                        required>
                </div>

                <div class="mb-4">
                    <label class="text-white font-semibold">Email</label>
                    <input
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        class="w-full mt-2 p-3 rounded-lg outline-none"
                        required>
                </div>

                <div class="mb-6">
                    <label class="text-white font-semibold">Password</label>
                    <input
                        type="password"
                        name="password"
                        placeholder="Create a password"
                        class="w-full mt-2 p-3 rounded-lg outline-none"
                        required>
                </div>

                <button
                    type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold transition">

                    Create Account

                </button>

            </form>

            <p class="text-center text-white mt-6">

                Already have an account?

                <a href="/login" class="font-bold underline">
                    Login
                </a>

            </p>

        </div>

    </div>

</body>
</html>
